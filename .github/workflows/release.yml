name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Build a raw binary per platform and attach it to the GitHub release.
  # The npm installer downloads these exact asset names.
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Both macOS targets build on the Apple Silicon runner: aarch64
          # native, x86_64 cross-compiled. Avoids the scarce macos-13 (Intel)
          # runners that can queue for a long time.
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          ext=""
          [ "${{ runner.os }}" = "Windows" ] && ext=".exe"
          cp "target/${{ matrix.target }}/release/castsvg$ext" "castsvg-${{ matrix.target }}$ext"
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: castsvg-${{ matrix.target }}*
          fail_on_unmatched_files: true

  # Publish the npm wrapper. Skipped automatically if NPM_TOKEN isn't set,
  # so tagging before you've configured the token won't fail the release.
  npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for token
        id: gate
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "castsvg: NPM_TOKEN not set — skipping npm publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish
        if: steps.gate.outputs.skip != 'true'
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          CASTSVG_SKIP_DOWNLOAD: "1"
        run: npm publish --access public

  # Publish the crate so `cargo install castsvg` works. Skipped if the token
  # isn't set.
  crates:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for token
        id: gate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "castsvg: CARGO_REGISTRY_TOKEN not set — skipping crates.io publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: dtolnay/rust-toolchain@stable
        if: steps.gate.outputs.skip != 'true'
      - name: Publish
        if: steps.gate.outputs.skip != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
